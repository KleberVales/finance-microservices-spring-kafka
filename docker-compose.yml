
services:

  user-db:
    image: postgres:17
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_service
      POSTGRES_PASSWORD: user_service_pass
    ports:
      - "5433:5432"
    volumes:
      - user_data:/var/lib/postgresql/data

  accounts-db:
    image: postgres:17
    container_name: account-db
    environment:
      POSTGRES_DB: account_db
      POSTGRES_USER: account_service
      POSTGRES_PASSWORD: account_service_pass
    ports:
      - "5434:5432"
    volumes:
      - account_data:/var/lib/postgresql/data

  planning-db:
    image: postgres:17
    container_name: planning-db
    environment:
      POSTGRES_DB: planning_db
      POSTGRES_USER: planning_service
      POSTGRES_PASSWORD: planning_service_pass
    ports:
      - "5435:5432"
    volumes:
      - planning_data:/var/lib/postgresql/data

  report-db:
    image: postgres:17
    container_name: report-db
    environment:
      POSTGRES_DB: report_db
      POSTGRES_USER: report_service
      POSTGRES_PASSWORD: report_service_pass
    ports:
      - "5436:5432"
    volumes:
      - report_data:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  user-service:
    build: ./user-service
    container_name: user-service
    depends_on:
      - user-db
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/user_db
      SPRING_DATASOURCE_USERNAME: user_service
      SPRING_DATASOURCE_PASSWORD: user_service_pass

  auth-service:
    build: ./auth-service
    container_name: auth-service
    depends_on:
      - user-service
    ports:
      - "8082:8080"
    environment:
      USER_SERVICE_URL: http://user-service:8080

  account-service:
    build: ./account-service
    container_name: account-service
    depends_on:
      - accounts-db
    ports:
      - "8083:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://account-db:5432/account_db
      SPRING_DATASOURCE_USERNAME: account_service
      SPRING_DATASOURCE_PASSWORD: account_service_pass

  planning-service:
    build: ./planning-service
    container_name: planning-service
    depends_on:
      - planning-db
    ports:
      - "8084:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://planning-db:5432/planning_db
      SPRING_DATASOURCE_USERNAME: planning_service
      SPRING_DATASOURCE_PASSWORD: planning_service_pass

  report-service:
    build: ./report-service
    container_name: report-service
    depends_on:
      - report-db
    ports:
      - "8085:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://report-db:5432/report_db
      SPRING_DATASOURCE_USERNAME: report_service
      SPRING_DATASOURCE_PASSWORD: report_service_pass

volumes:
  user_data:
  account_data:
  planning_data:
  report_data: