version: '3.8'

services:

  postgres:
    image: postgres:17
    container_name: postgres
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_service
      POSTGRES_PASSWORD: user_service_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  user-service:
    build: ./user-service
    container_name: user-service
    depends_on:
      - postgres
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_db
      SPRING_DATASOURCE_USERNAME: user_service
      SPRING_DATASOURCE_PASSWORD: user_service_pass

  auth-service:
    build: ./auth-service
    container_name: auth-service
    depends_on:
      - user-service
    ports:
      - "8082:8080"
    environment:
      USER_SERVICE_URL: http://user-service:8080

volumes:
  postgres_data: